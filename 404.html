<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>جارٍ التحويل | سينما الورشة</title>
  </head>
  <body>
    <script>
      (function redirectToApp() {
        var currentPath = window.location.pathname;
        var cleanPath = currentPath.replace(/\/+$/, "");
        var parts = cleanPath.split("/").filter(Boolean);
        var baseParts = parts.slice();
        var roomId = "";

        if (parts.length && /^\d{4}$/.test(parts[parts.length - 1])) {
          roomId = parts[parts.length - 1];
          baseParts = parts.slice(0, -1);
        } else if (parts.length > 1) {
          baseParts = parts.slice(0, -1);
        }

        var basePath = "/" + baseParts.join("/");
        if (basePath !== "/") {
          basePath += "/";
        }

        sessionStorage.setItem(
          "cinema-al-warsha-route",
          window.location.pathname + window.location.search + window.location.hash
        );

        window.location.replace(roomId ? basePath + "?room=" + roomId : basePath);
      })();
    </script>
  </body>
</html>
